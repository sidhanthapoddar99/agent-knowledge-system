# About Page Data
title: "About"
description: "Learn more about agent-knowledge-system"

content: |
  This is agent-knowledge-system — a knowledge + task system for AI consumers, built with Astro.

  ## Features

  - Fast static site generation
  - MDX support for interactive documentation
  - Beautiful default theme with dark mode
  - Easy YAML configuration
  - Auto-generated sidebar from folder structure

  ## Technology Stack

  - **Astro** - Static site generator
  - **MDX** - Markdown with JSX components
  - **TypeScript** - Type-safe development
